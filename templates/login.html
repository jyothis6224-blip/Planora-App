<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planora - Welcome Back</title>
    <style>
        :root { 
            --bg: #fdfbfb; 
            --paper: #ffffff; 
            --lavender: #f3e8ff; 
            --mint: #e2f3f5;
            --text: #4a4e69; 
            --accent: #9d8189;
        }

        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(#d1d1d1 0.8px, transparent 0); 
            background-size: 25px 25px; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }

        /* The Card */
        .login-card { 
            background: var(--paper); 
            width: 100%; max-width: 340px; 
            padding: 3rem 2.5rem; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.04); 
            text-align: center;
            border: 1px solid rgba(0,0,0,0.02);
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        h1 { 
            font-weight: 300; font-size: 1.8rem; 
            color: var(--accent); margin-bottom: 8px; 
            letter-spacing: -0.5px;
        }

        .subtitle { color: #aaa; font-size: 0.9rem; margin-bottom: 30px; }

        /* Inputs */
        input { 
            width: 100%; padding: 14px 18px; margin-bottom: 15px; 
            border: 1.5px solid #f0f0f0; border-radius: 12px; 
            outline: none; box-sizing: border-box; 
            background: #fafafa; font-size: 1rem; color: var(--text);
            transition: all 0.3s ease;
        }

        input:focus { 
            border-color: var(--lavender); 
            background: #fff; 
            box-shadow: 0 0 10px rgba(220, 214, 247, 0.3); 
        }

        /* Button */
        button { 
            width: 100%; border: none; padding: 14px; 
            border-radius: 12px; cursor: pointer; 
            background: linear-gradient(135deg, #dcd6f7, #f3e8ff); 
            color: var(--text); font-weight: 600; font-size: 1rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        button:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(220, 214, 247, 0.4); 
        }

        button:active { transform: translateY(0); }

        .footer { font-size: 0.85rem; color: #888; margin-top: 25px; }
        .footer a { 
            color: var(--accent); text-decoration: none; 
            font-weight: 600; border-bottom: 1px solid transparent;
            transition: border 0.3s;
        }
        .footer a:hover { border-bottom: 1px solid var(--accent); }

        /* Floating decoration */
        .circle {
            position: absolute; width: 200px; height: 200px;
            background: radial-gradient(circle, var(--mint), transparent);
            border-radius: 50%; z-index: -1; opacity: 0.5;
            animation: float 6s infinite ease-in-out;
        }
        @keyframes float { 
            0%, 100% { transform: translate(0, 0); } 
            50% { transform: translate(20px, -20px); } 
        }
    </style>
</head>
<body>
    <div class="circle" style="top: 10%; right: 15%;"></div>
    <div class="circle" style="bottom: 10%; left: 10%; background: radial-gradient(circle, var(--lavender), transparent);"></div>

    <div class="login-card">
        <h1>Planora</h1>
        <div class="subtitle">Focus on what matters.</div>
        
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required autofocus>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>
        
        <div class="footer">
            New to Planora? <a href="/register">Create an account</a>
        </div>
    </div>
</body>
</html>
