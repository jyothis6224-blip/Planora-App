<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planora</title>
    <style>
        :root { --bg: #fdfbfb; --paper: #ffffff; --mint: #e2f3f5; --lavender: #f3e8ff; --text: #4a4e69; }
        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(#d1d1d1 1px, transparent 0); 
            background-size: 30px 30px; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; justify-content: center; padding: 50px; 
        }
        .container { 
            background: var(--paper); width: 100%; max-width: 400px; padding: 2rem; 
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            animation: fadeIn 0.8s ease-out; 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        h1 { font-weight: 300; text-align: center; color: #9d8189; margin-bottom: 5px; }
        .progress-container { background: #eee; border-radius: 10px; height: 8px; margin: 20px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #b8e1dd, #dcd6f7); transition: width 0.5s; }
        .task-item { display: flex; align-items: center; padding: 12px; margin-bottom: 10px; background: var(--lavender); border-radius: 10px; transition: 0.3s; }
        .task-item.done { opacity: 0.5; text-decoration: line-through; background: var(--mint); }
        .stars { color: #ffb703; margin-right: 10px; }
        input[type="text"] { padding: 10px; border: 1px solid #ddd; border-radius: 8px; flex: 1; outline: none; }
        select { border: 1px solid #ddd; border-radius: 8px; padding: 5px; background: white; }
        button { border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; background: #dcd6f7; color: #4a4e69; }
        a { text-decoration: none; color: inherit; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Planora</h1>
        <div class="progress-container"><div class="progress-bar" style="width: {{ progress }}%"></div></div>
        <p style="text-align: center;"><small>{{ remaining }} tasks remaining</small></p>

        <form action="/add" method="POST" style="display:flex; gap:8px; margin-bottom:20px;">
            <input type="text" name="content" placeholder="What needs doing?" required>
            <select name="priority">
    		<option value="5">⭐⭐⭐⭐⭐ (High)</option>
    		<option value="4">⭐⭐⭐⭐</option>
    		<option value="3">⭐⭐⭐ (Mid)</option>
    		<option value="2">⭐⭐</option>
    		<option value="1">⭐ (Low)</option>
	    </select>
            <button type="submit">+</button>
        </form>

        {% for task in tasks %}
        <div class="task-item {{ 'done' if task.done else '' }}">
            <span class="stars">{{ "★" * task.priority }}</span>
            <a href="/toggle/{{ task.id }}" style="flex:1;">{{ task.content }}</a>
            <a href="/delete/{{ task.id }}" style="color:#ff9999; font-weight: bold;">✕</a>
        </div>
        {% endfor %}

        {% if tasks %}
        <div style="text-align:center; margin-top:20px;">
            <a href="/clear"><button style="background:#ffdbdb">Clear Completed</button></a>
        </div>
        {% endif %}
    </div>
</body>
</html>
